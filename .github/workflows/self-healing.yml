name: Self-Healing

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check Health
        id: health
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No DEPLOY_URL configured, skipping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$DEPLOY_URL/api/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check returned HTTP $STATUS"

      - name: Auto-Rollback on Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        run: |
          echo "Health check failed (HTTP ${{ steps.health.outputs.status }})"
          PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_SHA" ]; then
            echo "Triggering rollback to $PREV_SHA"
            gh workflow run auto-deploy.yml --ref "$PREV_SHA"
          else
            echo "No previous commit available for rollback"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Persistent Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-failure',
              per_page: 1,
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Deployment Health Check Failed',
                body: [
                  `Health check returned HTTP ${{ steps.health.outputs.status }}.`,
                  '',
                  `- **Workflow:** ${context.workflow}`,
                  `- **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  `- **Commit:** ${context.sha}`,
                ].join('\n'),
                labels: ['bug', 'deployment-failure'],
              });
            }
